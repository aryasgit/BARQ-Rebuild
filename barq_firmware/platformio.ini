; BARQ Teensy 4.1 firmware (Stage 3). Two environments:
;   native   - host-compiled Unity tests for the protocol codec (no hardware needed)
;   teensy41 - the real firmware build (USB CDC serial superloop)
[platformio]
default_envs = teensy41

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<protocol.cpp>
build_flags = -std=c++17 -Wall -Wextra

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
build_flags = -std=c++17 -Wall
