# BARQ Robot Parameters
# Single source of truth for all geometry and hardware mappings.
# Lengths in metres. Angles in radians.
# TODO: Update link lengths and body dimensions once CAD is finalised.

body:
  length: 0.258        # from URDF base_link collision box
  width:  0.117        # from URDF base_link collision box
  height: 0.085        # from URDF base_link collision box
  mass:   1.42         # measured 2026-06-11 (Aryaman), incl. electronics/fasteners

# Measured link masses (2026-06-11, Aryaman; servos+fasteners included). Total ~= 2.448 kg.
link_masses:
  coxa:  0.0733
  femur: 0.1536
  tibia: 0.030

actuators:
  model: ST3215
  peak_torque_nm: 2.94    # 30 kg.cm mechanical peak (Aryaman 2026-06-11) -> URDF joint effort
  max_speed_rad_s: 4.71    # 0.222 s/60deg @12V no-load (Waveshare spec) -> URDF joint velocity cap

legs:
  # EXACT leg kinematics (D-014): the URDF chain, modelled without approximation.
  # barq_control/leg_kinematics.py (fk_exact/ik_exact) computes from these same origins;
  # verified against the raw URDF chain in test_exact_kinematics.py.
  knee_x_front:   0.01744     # knee-origin x in coxa frame; rear legs are -0.01744
  knee_y:         0.0430692   # knee-origin lateral offset (per side)
  ankle_x:        0.018944    # ankle-origin x in femur frame (all legs)
  ankle_y:        0.0324      # ankle-origin lateral offset (per side)
  femur_z:        0.1         # femur vertical drop to ankle
  lateral_offset: 0.0754692   # knee_y + ankle_y (combined q1-plane lateral)
  tibia_length:   0.100       # ankle -> foot point

  # LEGACY idealized lengths (up to 3.4 cm foot error at the front legs - do not use
  # for control; kept only for reference/servo bring-up notes):
  coxa_length:  0.0465   # sqrt(0.01744^2 + 0.0430692^2)
  femur_length: 0.107    # sqrt(0.018944^2 + 0.0324^2 + 0.1^2)

  # Hip joint offsets from body centre (x forward, y left, z up).
  # Exact values from URDF joint origins.
  # NOTE: left/right Y offsets are NOT symmetric (~17mm L vs ~15mm R) -- as-designed.
  hip_offsets:
    FL: [ 0.108484,  0.0171913, 0.00022012]
    FR: [ 0.108484, -0.0148092, 0.00022176]
    RL: [-0.108371,  0.0167905, 0.00022176]
    RR: [-0.108371, -0.01521,   0.00022012]

servos:
  # ID assignments: legs in FL/FR/RL/RR order, joints in coxa/femur/tibia order
  FL_coxa:  { id: 0,  direction:  1, zero_offset: 0.0, min_angle: -0.785, max_angle: 0.785 }
  FL_femur: { id: 1,  direction:  1, zero_offset: 0.0, min_angle: -1.571, max_angle: 1.571 }
  FL_tibia: { id: 2,  direction:  1, zero_offset: 0.0, min_angle: -2.2, max_angle: 0.0   }
  FR_coxa:  { id: 3,  direction: -1, zero_offset: 0.0, min_angle: -0.785, max_angle: 0.785 }
  FR_femur: { id: 4,  direction:  1, zero_offset: 0.0, min_angle: -1.571, max_angle: 1.571 }
  FR_tibia: { id: 5,  direction:  1, zero_offset: 0.0, min_angle: -2.2, max_angle: 0.0   }
  RL_coxa:  { id: 6,  direction:  1, zero_offset: 0.0, min_angle: -0.785, max_angle: 0.785 }
  RL_femur: { id: 7,  direction:  1, zero_offset: 0.0, min_angle: -1.571, max_angle: 1.571 }
  RL_tibia: { id: 8,  direction:  1, zero_offset: 0.0, min_angle: -2.2, max_angle: 0.0   }
  RR_coxa:  { id: 9,  direction: -1, zero_offset: 0.0, min_angle: -0.785, max_angle: 0.785 }
  RR_femur: { id: 10, direction:  1, zero_offset: 0.0, min_angle: -1.571, max_angle: 1.571 }
  RR_tibia: { id: 11, direction:  1, zero_offset: 0.0, min_angle: -2.2, max_angle: 0.0   }